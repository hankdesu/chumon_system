name: Build and Deploy FastAPI to k3s

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout github.repository
        uses: actions/checkout@v4

      - name: Login github container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish docker image
        uses: docker/build-push-action@v5
        with:
          context: docker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-to-respberry-pi:
    needs: build-and-push-image
    runs-on: self-hosted

    steps:
      - name: Trigger k3 rolling update
        run: |
          echo "Starting notify k3s to pull latest image..."
          sudo k3s kubectl rollout restart deployment/fastapi-web
          sudo k3s kubectl rollout status deployment/fastapi-web
